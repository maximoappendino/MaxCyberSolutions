<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MaxCyberSolutions</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="img/icon.webp" type="image/webp" />

  <!-- Hreflang for search engines -->
  <!-- Replace maxcybersolutions.com with your actual domain in all hreflang tags -->
  <link rel="alternate" hreflang="en"        href="https://www.maxcybersolutions.com/en/" />
  <link rel="alternate" hreflang="es"        href="https://www.maxcybersolutions.com/es/" />
  <link rel="alternate" hreflang="it"        href="https://www.maxcybersolutions.com/it/" />
  <link rel="alternate" hreflang="x-default" href="https://www.maxcybersolutions.com/en/" />

  <script>
    // Detect browser language → redirect to the matching subfolder.
    // Falls back to /en/ for any unsupported language.
    (function () {
      var lang = (navigator.language || navigator.userLanguage || 'en')
                   .split('-')[0].toLowerCase();
      var map  = { en: 'en', es: 'es', it: 'it' };
      location.replace((map[lang] || 'en') + '/');
    })();
  </script>

  <!-- No-JS fallback: redirect to English -->
  <noscript>
    <meta http-equiv="refresh" content="0;url=en/" />
  </noscript>
</head>
<body>
  <!-- Shown only if both JS and meta-refresh fail -->
  <p style="font-family:sans-serif;padding:2rem">
    <a href="en/">English</a> &nbsp;|&nbsp;
    <a href="es/">Español</a> &nbsp;|&nbsp;
    <a href="it/">Italiano</a>
  </p>
</body>
</html>
